server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: file://${user.dir}/config-repo
          
eureka:
  instance:
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

encrypt:
  key: ${ENCRYPT_KEY:default-encryption-key-for-csms-system-needs-to-be-strong}
