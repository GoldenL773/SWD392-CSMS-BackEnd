server:
  port: 8086

spring:
  application:
    name: report-service
  datasource:
    url: jdbc:sqlserver://sqlserver:1433;databaseName=csms_report;encrypt=false;trustServerCertificate=true
    username: sa
    password: Password123
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
