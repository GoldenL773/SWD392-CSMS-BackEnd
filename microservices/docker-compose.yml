      config-server:
        condition: service_healthy
    networks:
      - csms-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    command: /bin/bash -c "/docker-entrypoint-initdb.d/setup.sh & /opt/mssql/bin/sqlservr"
    ports:
      - "1434:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Password123
      - MSSQL_PID=Developer
    volumes:
    - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - csms-network

networks:
  csms-network:
    driver: bridge
